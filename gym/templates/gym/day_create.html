{% extends "gym/base.html" %}
{% block title %}Log Workout - Gym Logger{% endblock %}
{% block content %}
<h1>Log Workout</h1>

<form method="post" id="dayForm">
    {% csrf_token %}

    <div class="card">
        <div class="form-row">
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" name="date" id="date" value="{{ today }}" required>
            </div>
            <div class="form-group">
                <label for="preset">Preset (optional)</label>
                <select name="preset" id="preset">
                    <option value="">— Custom Day —</option>
                    {% for preset in presets %}
                    <option value="{{ preset.id }}">{{ preset.name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea name="notes" id="notes" rows="2" placeholder="Optional notes..."></textarea>
        </div>
    </div>

    <div class="card">
        <h2>Choose Exercises</h2>
        <div class="exercise-list" id="exerciseList">
            {% for exercise in exercises %}
            <div class="exercise-chip" data-id="{{ exercise.id }}" onclick="toggleExercise(this)">
                {{ exercise.name }}
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="selectedContainer" style="display: none;" class="card">
        <h2>Selected Exercises</h2>
        <div id="selectedExercises"></div>
    </div>

    <button type="submit" class="btn btn-primary w-full" style="padding: 14px;">Save Workout</button>
</form>

<script>
    const presetExercises = {{ preset_exercises|safe }};
    const selected = new Set();

    function toggleExercise(el) {
        const id = parseInt(el.dataset.id);
        if (selected.has(id)) {
            selected.delete(id);
            el.classList.remove('selected');
        } else {
            selected.add(id);
            el.classList.add('selected');
        }
        renderSelected();
    }

    function renderSelected() {
        const container = document.getElementById('selectedContainer');
        const list = document.getElementById('selectedExercises');
        const chips = document.querySelectorAll('.exercise-chip');

        if (selected.size === 0) {
            container.style.display = 'none';
            return;
        }
        container.style.display = 'block';
        list.innerHTML = '';
        selected.forEach(id => {
            const chip = document.querySelector(`.exercise-chip[data-id="${id}"]`);
            const name = chip ? chip.textContent.trim() : id;
            const div = document.createElement('div');
            div.className = 'exercise-chip flex-between mb-md';
            div.style.marginBottom = '4px';
            div.innerHTML = `<span>${name}</span> <span class="text-muted" style="cursor:pointer" onclick="toggleExercise(document.querySelector('.exercise-chip[data-id=\\"${id}\\"]'))">✕</span>`;
            list.appendChild(div);
        });
    }

    document.getElementById('preset').addEventListener('change', function() {
        const id = this.value;
        selected.clear();
        document.querySelectorAll('.exercise-chip').forEach(el => el.classList.remove('selected'));

        if (id && presetExercises[id]) {
            presetExercises[id].forEach(eid => {
                selected.add(eid);
                const chip = document.querySelector(`.exercise-chip[data-id="${eid}"]`);
                if (chip) chip.classList.add('selected');
            });
        }
        renderSelected();
    });

    document.getElementById('dayForm').addEventListener('submit', function(e) {
        if (selected.size === 0) {
            e.preventDefault();
            alert('Please select at least one exercise.');
            return;
        }
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'exercises';
        input.value = Array.from(selected).join(',');
        this.appendChild(input);
    });
</script>
{% endblock %}
