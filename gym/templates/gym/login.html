{% extends "gym/base.html" %}
{% block title %}Gym Logger - Login{% endblock %}
{% block content %}
<div class="hero">
    <div class="card">
        <h1>Gym Logger</h1>
        <p class="subtitle">Log your workouts. Track your progress.</p>

        {% if form.errors %}
        <ul class="errorlist">
            <li>Invalid username or password.</li>
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary w-full">Sign In</button>
        </form>

        <p class="text-muted text-center mt-md">Demo: user / 1234</p>
    </div>
</div>
{% endblock %}
